coverage:
  status:
    patch:
      default:
        target: 80%      # new code must be 80% covered
    project:
      default:
        threshold: 2%    # overall coverage can drop max 2%

flags:
  rust:
    paths:
      - contracts/
    carryforward: true
  typescript:
    paths:
      - sdk/
    carryforward: true
